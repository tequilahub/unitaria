<div class="furo-version-switcher"
     style="padding: 1rem; border-top: 1px solid var(--color-sidebar-item-background--hover);">
    <label for="version-select"
           style="display: block; margin-bottom: 0.5rem; font-weight: bold; color: var(--color-foreground-primary);">
        Version: {{ current_version }}
    </label>
    <select id="version-select"
            style="width: 100%; padding: 0.25rem; border-radius: 4px; border: 1px solid var(--color-sidebar-item-background--hover); background-color: var(--color-background-primary); color: var(--color-foreground-primary);">
        {% for version in versions %}
        <option value="{{ version }}" {% if version== current_version %}selected{% endif %}>
            {{ version }}
        </option>
        {% endfor %}
    </select>
</div>

<script>
    document.getElementById("version-select").addEventListener("change", function () {
        const currentVersion = "{{ current_version }}";
        const currentPath = currentVersion.startsWith("git") ? "git" : currentVersion;
        const targetVersion = this.value;
        const targetPath = targetVersion.startsWith("git") ? "git" : targetVersion;
        window.location.href = window.location.href.replace("/" + currentPath + "/", "/" + targetPath + "/");
    });
</script>
